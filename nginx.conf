server {
    listen 80;
    server_name skygatecommunity.home.lab;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets aggressively (Astro uses content hashes)
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pagefind index files (updated on each build)
    location /pagefind/ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri $uri/ =404;
    }

    # Astro static pages — try .html extension fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
