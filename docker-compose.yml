services:
  skygate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skygate-website
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # HTTP → HTTPS redirect
      - "traefik.http.routers.skygatecommunity-http.rule=Host(`skygatecommunity.home.lab`)"
      - "traefik.http.routers.skygatecommunity-http.entrypoints=web"
      - "traefik.http.routers.skygatecommunity-http.middlewares=redirect-to-https@file"

      # HTTPS — uses wildcard *.home.lab cert from tls.yml
      - "traefik.http.routers.skygatecommunity.rule=Host(`skygatecommunity.home.lab`)"
      - "traefik.http.routers.skygatecommunity.entrypoints=websecure"
      - "traefik.http.routers.skygatecommunity.tls=true"

      - "traefik.http.services.skygatecommunity.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
